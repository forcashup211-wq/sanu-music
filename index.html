<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanu - Full Songs Download</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060010;color:#f0eaff;font-family:system-ui;height:100vh;display:flex;flex-direction:column;}
.hdr{background:rgba(13,0,31,.9);padding:12px 18px;display:flex;align-items:center;gap:12px;}
.logo{font-size:22px;font-weight:800;color:#e0aaff;}
.srch{padding:12px 16px;display:flex;gap:8px;}
.srch input{flex:1;background:#160030;border:1px solid rgba(157,78,221,.15);border-radius:50px;padding:10px 16px;color:#f0eaff;outline:none;}
.srch button{background:linear-gradient(135deg,#9d4edd,#e040fb);border:none;border-radius:50px;padding:0 20px;color:#fff;cursor:pointer;font-weight:600;}
.content{flex:1;overflow-y:auto;padding:10px 14px;}
.srow{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer;border-bottom:1px solid rgba(157,78,221,.05);}
.srow:hover{background:rgba(157,78,221,.08)}
.sthumb{width:45px;height:45px;border-radius:6px;object-fit:cover;background:#160030;}
.sinfo{flex:1;min-width:0}
.stitle{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sartist{font-size:11px;color:#b39ddb;}
.dbtn{background:none;border:none;cursor:pointer;color:#9d4edd;font-size:16px;padding:6px;}
.player{background:rgba(13,0,31,.95);border-top:1px solid rgba(157,78,221,.15);padding:10px 14px;display:flex;align-items:center;gap:10px;}
.pbtn{background:linear-gradient(135deg,#9d4edd,#e040fb);border:none;border-radius:50%;width:40px;height:40px;color:#fff;cursor:pointer;font-size:18px;}
.spin{display:inline-block;width:20px;height:20px;border:2px solid rgba(157,78,221,.2);border-top-color:#9d4edd;border-radius:50%;animation:spin .7s infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">🎵 Sanu - Full Songs</div>
</div>

<div class="srch">
  <input type="text" id="q" placeholder="Search songs..." onkeypress="if(event.key==='Enter')search()"/>
  <button onclick="search()">Search</button>
</div>

<div class="content" id="results"></div>

<div class="player">
  <div style="width:40px;height:40px;border-radius:6px;background:#160030;display:flex;align-items:center;justify-content:center;font-size:18px;">🎵</div>
  <div style="flex:1;min-width:0;">
    <div id="npT" style="font-size:12px;font-weight:600;">No song</div>
    <div id="npA" style="font-size:10px;color:#b39ddb;"></div>
  </div>
  <button class="dbtn" onclick="dlSong()">⬇️</button>
  <button class="pbtn" onclick="togglePlay()">▶️</button>
</div>

<audio id="player"></audio>

<script>
let curSong=null, playing=false;
const player=document.getElementById('player');

async function search(){
  const q=document.getElementById('q').value.trim();
  if(!q)return;
  
  const res=document.getElementById('results');
  res.innerHTML='<div style="text-align:center;padding:40px;"><div class="spin"></div></div>';
  
  try{
    // Using Deezer API (works without auth for basic search)
    const r=await fetch(`https://api.deezer.com/search?q=${encodeURIComponent(q)}&limit=20`);
    const d=await r.json();
    
    if(d.data && d.data.length){
      res.innerHTML=d.data.map(t=>`
        <div class="srow" onclick="play({
          title:'${t.title.replace(/'/g,"\\'")}',
          artist:'${t.artist.name.replace(/'/g,"\\'")}',
          image:'${t.album.cover_medium}',
          preview:'${t.preview||''}'
        })">
          <img class="sthumb" src="${t.album.cover_medium}"/>
          <div class="sinfo">
            <div class="stitle">${t.title}</div>
            <div class="sartist">${t.artist.name}</div>
          </div>
          <button class="dbtn" onclick="event.stopPropagation(); dl('${t.title}', '${t.preview||''}')">⬇️</button>
        </div>
      `).join('');
    }else{
      res.innerHTML='<div style="text-align:center;padding:40px;">No songs</div>';
    }
  }catch(e){
    res.innerHTML='<div style="text-align:center;padding:40px;">Error: '+e.message+'</div>';
  }
}

function play(song){
  if(!song.preview){alert('Preview not available');return;}
  curSong=song;
  document.getElementById('npT').textContent=song.title;
  document.getElementById('npA').textContent=song.artist;
  player.src=song.preview;
  player.play();
  playing=true;
  document.querySelector('.pbtn').textContent='⏸️';
}

function togglePlay(){
  if(!curSong)return;
  playing=!playing;
  if(playing)player.play();
  else player.pause();
  document.querySelector('.pbtn').textContent=playing?'⏸️':'▶️';
}

function dl(name, url){
  if(!url){alert('Download not available for this song');return;}
  const a=document.createElement('a');
  a.href=url;
  a.download=name+'.mp3';
  a.click();
}

function dlSong(){
  if(!curSong)return;
  dl(curSong.title, curSong.preview);
}
</script>

</body>
</html>
