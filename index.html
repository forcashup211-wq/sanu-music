<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanu Music - Full Songs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060010;color:#f0eaff;font-family:'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;}
.hdr{background:rgba(13,0,31,.9);padding:12px 18px;display:flex;align-items:center;gap:12px;}
.logo{font-size:22px;font-weight:800;color:#e0aaff;}
.srch{padding:12px 16px;display:flex;gap:8px;}
.srch input{flex:1;background:#160030;border:1px solid rgba(157,78,221,.15);border-radius:50px;padding:10px 16px;color:#f0eaff;outline:none;}
.srch button{background:linear-gradient(135deg,#9d4edd,#e040fb);border:none;border-radius:50px;padding:0 20px;color:#fff;cursor:pointer;}
.content{flex:1;overflow-y:auto;padding:10px 14px;}
.srow{display:flex;align-items:center;gap:10px;padding:8px;border-radius:12px;cursor:pointer;border-bottom:1px solid rgba(157,78,221,.05);}
.srow:hover{background:rgba(157,78,221,.08)}
.srow.playing{background:rgba(157,78,221,.14)}
.sthumb{width:46px;height:46px;border-radius:9px;object-fit:cover;}
.sinfo{flex:1;min-width:0}
.stitle{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sartist{font-size:11px;color:#b39ddb;}
.dbtn{background:none;border:none;cursor:pointer;padding:6px;color:#6048a0;font-size:14px;}
.player{background:rgba(13,0,31,.95);border-top:1px solid rgba(157,78,221,.15);padding:10px 14px;display:flex;align-items:center;gap:10px;}
.pbtn{background:linear-gradient(135deg,#9d4edd,#e040fb);border:none;border-radius:50%;width:40px;height:40px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">🎵 Sanu - Full Songs</div>
</div>

<div class="srch">
  <input type="text" id="q" placeholder="Search full songs..." onkeypress="if(event.key==='Enter')doSearch()"/>
  <button onclick="doSearch()">Search</button>
</div>

<div class="content" id="results"></div>

<div class="player">
  <div style="width:40px;height:40px;border-radius:8px;background:#160030;display:flex;align-items:center;justify-content:center;">🎵</div>
  <div style="flex:1;min-width:0">
    <div id="npT" style="font-size:12px;font-weight:600;">No song</div>
    <div id="npA" style="font-size:10px;color:#b39ddb;"></div>
  </div>
  <button class="dbtn" onclick="downloadSong()">⬇️</button>
  <button class="pbtn" onclick="togglePlay()">▶️</button>
</div>

<audio id="player"></audio>

<script>
let curSong=null, playing=false;
const player=document.getElementById('player');

async function doSearch(){
  const q=document.getElementById('q').value.trim();
  if(!q)return;
  
  const res=document.getElementById('results');
  res.innerHTML='<div style="text-align:center;padding:40px;"><div style="display:inline-block;width:30px;height:30px;border:3px solid rgba(157,78,221,.2);border-top-color:#9d4edd;border-radius:50%;animation:spin .7s infinite;"></div></div>';
  
  try{
    // Using a free music API
    const r=await fetch(`https://saavn.dev/api/search/songs?query=${encodeURIComponent(q)}`);
    const d=await r.json();
    
    if(d.data && d.data.results && d.data.results.length){
      res.innerHTML=d.data.results.map((t,i)=>`
        <div class="srow" onclick="play({
          title:'${t.name.replace(/'/g,"\\'")}',
          artist:'${(t.artists?.[0]?.name||'Unknown').replace(/'/g,"\\'")}',
          url:'${t.downloadUrl?.[t.downloadUrl.length-1]?.url||''}',
          image:'${t.image?.[t.image.length-1]?.url||''}'
        })">
          <img class="sthumb" src="${t.image?.[t.image.length-1]?.url||''}"/>
          <div class="sinfo">
            <div class="stitle">${t.name}</div>
            <div class="sartist">${t.artists?.[0]?.name||'Unknown'}</div>
          </div>
          <button class="dbtn" onclick="event.stopPropagation(); downloadFile('${t.name}', '${t.downloadUrl?.[t.downloadUrl.length-1]?.url||''}')">⬇️</button>
        </div>
      `).join('');
    }else{
      res.innerHTML='<div style="text-align:center;padding:40px;">❌ No songs found</div>';
    }
  }catch(e){
    res.innerHTML='<div style="text-align:center;padding:40px;">⚠️ Error: '+e.message+'</div>';
  }
}

function play(song){
  curSong=song;
  if(!song.url){
    alert('Download link not available');
    return;
  }
  document.getElementById('npT').textContent=song.title;
  document.getElementById('npA').textContent=song.artist;
  player.src=song.url;
  player.play();
  playing=true;
  document.querySelector('.pbtn').textContent='⏸️';
}

function togglePlay(){
  if(!curSong)return;
  playing=!playing;
  if(playing)player.play();
  else player.pause();
  document.querySelector('.pbtn').textContent=playing?'⏸️':'▶️';
}

function downloadFile(name, url){
  if(!url){alert('No download link');return;}
  const a=document.createElement('a');
  a.href=url;
  a.download=name+'.mp3';
  a.click();
}

function downloadSong(){
  if(!curSong)return;
  downloadFile(curSong.title, curSong.url);
}
</script>

</body>
</html>
